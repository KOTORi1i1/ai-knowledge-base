# GitHub Actions 自动部署工作流
# 推送代码时自动构建并部署到 GitHub Pages

name: 部署网站

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 抓取最新数据
        run: |
          node scripts/fetch-papers.mjs || echo "⚠️ 论文抓取失败，使用已有数据"
          node scripts/fetch-news.mjs || echo "⚠️ 资讯抓取失败，使用已有数据"

      - name: 构建网站
        run: npm run build

      - name: 配置 CNAME（无自定义域名则跳过）
        run: |
          touch .vitepress/dist/.nojekyll

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .vitepress/dist
          publish_branch: gh-pages
          force_orphan: true
