name: 部署网站

on:
  push:
    branches: [master]
  schedule:
    # 比 daily-update 晚 15 分钟，等数据更新完再部署
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 抓取最新数据
        run: |
          node scripts/fetch-papers.mjs || echo "⚠️ 论文抓取失败"
          node scripts/fetch-news.mjs || echo "⚠️ 资讯抓取失败"
          node scripts/generate-daily-brief.mjs || echo "⚠️ 简报生成失败"

      - name: 构建网站
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
